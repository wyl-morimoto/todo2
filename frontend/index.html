<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-container glass-panel">
        <header class="app-header">
            <h1>🌱 WyLのお仕事</h1>
            <div class="header-actions" style="display: flex; gap: 12px; align-items: center;">
                <button id="download-csv-btn" class="primary-btn hidden" style="padding: 6px 12px; font-size: 0.85rem; display: none;">CSVダウンロード</button>
                <div class="tabs">
                    <button class="tab-btn active" data-tab="active">未完了</button>
                    <button class="tab-btn" data-tab="completed">完了</button>
                </div>
            </div>
        </header>

        <main class="grid-container">
            <div class="table-wrapper">
                <table class="task-table">
                    <thead>
                        <tr>
                            <th class="col-content">タスク内容</th>
                            <th class="col-date">記入日</th>
                            <th class="col-urgent">緊急</th>
                            <th class="col-date sortable" id="sort-due-date" title="クリックで並び替え">期日 🔼</th>
                            <th class="col-assignee">担当</th>
                            <th class="col-status">完了</th>
                            <th class="col-actions">操作</th>
                        </tr>
                    </thead>
                    <tbody id="task-list">
                        <!-- Tasks will be rendered here via JS -->
                    </tbody>
                </table>
            </div>
            
            <!-- Mobile FAB -->
            <button id="mobile-add-task-fab" class="mobile-fab" aria-label="タスクを追加">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>

            <!-- タスク追加コンテナ (Desktop: 下部固定, Mobile: モーダル) -->
            <div class="add-task-modal-overlay" id="add-task-modal-overlay">
                <div class="add-task-container" id="add-task-container">
                    <div class="modal-header">
                        <h2>新規タスク</h2>
                        <button type="button" class="close-modal-btn" id="close-modal-btn">&times;</button>
                    </div>
                    <form id="add-task-form" class="add-task-form">
                        <input type="text" id="new-content" placeholder="新しいタスクを入力..." required>
                        <input type="date" id="new-entry-date" required title="記入日">
                        <label class="checkbox-label" title="緊急">
                            <input type="checkbox" id="new-urgent">
                            <span class="custom-checkbox"></span>
                            <span class="cb-text">緊急</span>
                        </label>
                        <input type="date" id="new-due-date" title="期日">
                        
                        <div class="assignee-wrapper">
                            <select id="new-assignee" title="担当">
                                <option value="">担当者</option>
                                <!-- JSで動的生成 -->
                            </select>
                            <button type="button" id="add-assignee-btn" class="add-assignee-btn" title="担当者を追加">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            </button>
                        </div>
                        
                        <button type="submit" class="primary-btn submit-task-btn">追加</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="main.js"></script>
</body>
</html>
